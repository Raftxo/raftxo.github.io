<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Silent Pulse — Índice</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #f5f2e8;
            color: #1a1a1a;
            font-family: "Courier New", Courier, monospace;
            font-size: 16px;
            line-height: 1.6;
            min-height: 100vh;
            position: relative;
            overflow-x: hidden;
        }

        /* Canvas para cuadrícula en movimiento */
        #canvas-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            pointer-events: none;
            opacity: 0.4;
        }

        /* Contenedor principal */
        .container {
            position: relative;
            z-index: 1;
            max-width: 800px;
            margin: 0 auto;
            padding: 100px 50px;
        }

        /* Título principal */
        header {
            text-align: center;
            margin-bottom: 80px;
            padding-bottom: 40px;
            border-bottom: 2px solid #d4d0c0;
        }

        h1 {
            font-size: 14px;
            font-weight: normal;
            letter-spacing: 12px;
            text-transform: uppercase;
            color: #666;
            margin-bottom: 12px;
        }

        .subtitle {
            font-size: 12px;
            letter-spacing: 6px;
            color: #999;
            text-transform: uppercase;
        }

        /* Lista de entradas */
        .index-list {
            list-style: none;
        }

        .index-item {
            margin-bottom: 40px;
            position: relative;
        }

        .entry-line {
            display: flex;
            align-items: baseline;
            justify-content: space-between;
            position: relative;
        }

        .entry-main {
            display: flex;
            align-items: baseline;
            gap: 20px;
            flex: 1;
        }

        /* Número de entrada */
        .entry-number {
            font-size: 15px;
            color: #888;
            min-width: 30px;
            font-weight: normal;
        }

        /* Título del proyecto */
        .entry-title {
            font-size: 18px;
            color: #1a1a1a;
            text-decoration: none;
            position: relative;
            transition: color 0.3s ease;
            font-weight: normal;
        }

        .entry-title:hover {
            color: #555;
        }

        /* Línea punteada */
        .dots {
            flex: 1;
            border-bottom: 2px dotted #c0bcb0;
            margin: 0 16px;
            position: relative;
            top: -4px;
            min-width: 60px;
        }

        /* Año/fecha */
        .entry-year {
            font-size: 15px;
            color: #888;
            margin-left: 16px;
        }

        /* Descripción */
        .entry-desc {
            margin-left: 50px;
            margin-top: 8px;
            font-size: 14px;
            color: #777;
            font-style: italic;
        }

        /* Footer */
        footer {
            margin-top: 100px;
            padding-top: 40px;
            border-top: 2px solid #d4d0c0;
            text-align: center;
            font-size: 12px;
            color: #aaa;
            letter-spacing: 3px;
        }

        /* Responsive */
        @media (max-width: 600px) {
            .container {
                padding: 60px 24px;
            }

            .dots {
                display: none;
            }

            .entry-year {
                display: block;
                margin-left: 50px;
                margin-top: 6px;
            }

            .entry-line {
                flex-wrap: wrap;
            }

            .entry-title {
                font-size: 16px;
            }
        }
    </style>
</head>
<body>

    <canvas id="canvas-bg"></canvas>

    <div class="container">
        <header>
            <h1>The Silent Pulse</h1>
            <div class="subtitle">Índice de Proyectos de Raftxo en GitHub</div>
        </header>

        <!-- intentaremos cargar las repos desde GitHub con javascript y API -->
        <ul class="index-list" id="lista-proyectos"></ul>

        <footer>
            — 2023-2024 —
        </footer>
    </div>

<script>
async function cargarRepos() {
    const respuesta = await fetch("https://api.github.com/users/raftxo/repos");
    const repos = await respuesta.json();

    repos.sort((a, b) => new Date(b.updated_at) - new Date(a.updated_at));

    const ul = document.getElementById("lista-proyectos");

    repos.forEach((repo, index) => {
        const numero = String(index + 1).padStart(2, "0");
        const año = new Date(repo.created_at).getFullYear();
        const descripcion = repo.description || "Proyecto sin descripción";

        // 1. Si el repo tiene homepage configurado
        let urlWeb = repo.homepage && repo.homepage.trim() !== "" 
            ? repo.homepage 
            : null;

        // 2. Si no tiene homepage, intentamos GitHub Pages estándar
        if (!urlWeb) {
            urlWeb = `https://raftxo.github.io/${repo.name}/`;
        }

        // 3. Comprobación rápida: si la URL parece válida
        // (si quieres, podemos hacer un fetch HEAD para verificar)
        const tieneWeb = urlWeb !== null;

        // 4. Si no tiene web, usar la URL del repo
        const urlFinal = tieneWeb ? urlWeb : repo.html_url;

        // 5. Icono según si tiene web o no
        const icono = tieneWeb ? "🌐" : "📦";

        const li = document.createElement("li");
        li.className = "index-item";

        li.innerHTML = `
            <div class="entry-line">
                <div class="entry-main">
                    <span class="entry-number">${numero}</span>
                    <a href="${urlFinal}" class="entry-title" target="_blank">
                        ${icono} ${repo.name}
                    </a>
                </div>
                <span class="dots"></span>
                <span class="entry-year">${año}</span>
            </div>
            <div class="entry-desc">${descripcion}</div>
        `;

        ul.appendChild(li);
    });
}

cargarRepos();
</script>




    <script>
        const canvas = document.getElementById('canvas-bg');
        const ctx = canvas.getContext('2d');
        
        let width, height;
        let offset = 0;
        
        // Configuración de la cuadrícula
        const gridSize = 60;
        const lineColor = 'rgba(160, 150, 130, 0.3)'; // Gris cálido, sutil
        const lineWidth = 1;
        const speed = 0.3; // Velocidad del movimiento
        
        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        }
        
        function drawGrid() {
            ctx.clearRect(0, 0, width, height);
            
            ctx.strokeStyle = lineColor;
            ctx.lineWidth = lineWidth;
            
            // Líneas verticales
            for (let x = offset % gridSize; x < width; x += gridSize) {
                ctx.beginPath();
                ctx.moveTo(x, 0);
                ctx.lineTo(x, height);
                ctx.stroke();
            }
            
            // Líneas horizontales
            for (let y = offset % gridSize; y < height; y += gridSize) {
                ctx.beginPath();
                ctx.moveTo(0, y);
                ctx.lineTo(width, y);
                ctx.stroke();
            }
        }
        
        function animate() {
            offset += speed;
            drawGrid();
            requestAnimationFrame(animate);
        }
        
        window.addEventListener('resize', resize);
        
        resize();
        animate();
    </script>

</body>
</html>
